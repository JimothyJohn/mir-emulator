AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Read-only identity for the weekly endpoint-log triage routine (issue #22):
  an IAM user whose only permissions are CloudWatch Logs reads against the
  demo stack's two log groups. The routine runs outside GitHub Actions, so it
  cannot assume the OIDC deploy role; it authenticates with an access key
  created out-of-band (never in this template) and stored in the routine's
  environment.

Parameters:
  StackName:
    Type: String
    Default: mir-emulator-demo
    Description: The demo stack whose log groups this identity may read

Resources:
  LogTriageUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub ${StackName}-log-triage
      Policies:
        - PolicyName: read-demo-logs-only
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadDemoLogGroupsOnly
                Effect: Allow
                Action:
                  - logs:FilterLogEvents
                  - logs:StartQuery
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${StackName}
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${StackName}:*
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/apigateway/${StackName}
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/apigateway/${StackName}:*
              # GetQueryResults returns results only for query ids this
              # principal started; DescribeLogGroups is list-only. Neither
              # supports resource-level scoping.
              - Sid: QueryResultsAndListCannotBeScoped
                Effect: Allow
                Action:
                  - logs:GetQueryResults
                  - logs:DescribeLogGroups
                Resource: "*"

Outputs:
  LogTriageUserArn:
    Description: Create an access key for this user and store it in the triage routine's environment
    Value: !GetAtt LogTriageUser.Arn
