AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CI/CD identity for the mir-emulator demo: a role GitHub Actions assumes via
  the account's existing OIDC provider (scoped to one repo + branch), and a
  CloudFormation service role that holds the resource permissions so the
  GitHub role itself can only drive CloudFormation and the artifacts bucket.

Parameters:
  GitHubRepo:
    Type: String
    Default: JimothyJohn/mir-emulator
    Description: owner/repo allowed to assume the deploy role
  GitHubBranch:
    Type: String
    Default: master
    Description: Only pushes to this branch may deploy
  StackName:
    Type: String
    Default: mir-emulator-demo
    Description: The demo stack this identity is allowed to deploy
  HostedZoneId:
    Type: String
    Default: Z039212425BG1MHVPYWDN
    Description: Route53 zone the demo stack may write DNS records into

Resources:
  CfnExecRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${StackName}-cfn-exec
      Description: Assumed by CloudFormation to create/update the demo stack's resources
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: demo-stack-resources
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: LambdaOwnFunctionOnly
                Effect: Allow
                Action: lambda:*
                Resource:
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${StackName}
              # API Gateway v2 ARNs contain opaque ids minted at create time,
              # so this can only be scoped to the service within this region.
              - Sid: ApiGatewayThisRegion
                Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:DELETE
                Resource: !Sub arn:aws:apigateway:${AWS::Region}::/*
              - Sid: FunctionRoleLifecycle
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateRoleDescription
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${StackName}-FunctionRole-*
              - Sid: PassFunctionRoleToLambdaOnly
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub arn:aws:iam::${AWS::AccountId}:role/${StackName}-FunctionRole-*
                Condition:
                  StringEquals:
                    iam:PassedToService: lambda.amazonaws.com
              - Sid: OwnLogGroups
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                  - logs:TagResource
                  - logs:UntagResource
                  - logs:ListTagsForResource
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${StackName}*
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/apigateway/${StackName}*
              - Sid: DescribeLogGroupsIsListOnly
                Effect: Allow
                Action: logs:DescribeLogGroups
                Resource: "*"
              # ACM certificate ARNs are opaque ids; request/describe/delete
              # cannot be resource-scoped ahead of issuance.
              - Sid: AcmForCustomDomain
                Effect: Allow
                Action:
                  - acm:RequestCertificate
                  - acm:DescribeCertificate
                  - acm:DeleteCertificate
                  - acm:AddTagsToCertificate
                  - acm:ListTagsForCertificate
                Resource: "*"
              - Sid: DnsRecordsInOwnedZoneOnly
                Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                Resource: !Sub arn:aws:route53:::hostedzone/${HostedZoneId}
              - Sid: DnsChangePolling
                Effect: Allow
                Action: route53:GetChange
                Resource: arn:aws:route53:::change/*
              - Sid: FetchLambdaBundle
                Effect: Allow
                Action: s3:GetObject
                Resource: !Sub arn:aws:s3:::mir-emulator-artifacts-${AWS::AccountId}-${AWS::Region}/*

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${StackName}-github-deploy
      Description: !Sub Assumed by GitHub Actions (${GitHubRepo}@${GitHubBranch}) to deploy the demo
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubRepo}:ref:refs/heads/${GitHubBranch}
      Policies:
        - PolicyName: deploy-via-cloudformation-only
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DriveDemoStack
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                Resource:
                  - !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${StackName}/*
              - Sid: TemplateSummaryIsReadOnly
                Effect: Allow
                Action: cloudformation:GetTemplateSummary
                Resource: "*"
              - Sid: HandResourceWorkToCfnRole
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CfnExecRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: cloudformation.amazonaws.com
              - Sid: ArtifactsBucketRw
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::mir-emulator-artifacts-${AWS::AccountId}-${AWS::Region}
                  - !Sub arn:aws:s3:::mir-emulator-artifacts-${AWS::AccountId}-${AWS::Region}/*
              - Sid: ResolveZoneIdIsReadOnly
                Effect: Allow
                Action: route53:ListHostedZonesByName
                Resource: "*"

Outputs:
  GitHubDeployRoleArn:
    Description: Set as repo variable AWS_DEPLOY_ROLE_ARN
    Value: !GetAtt GitHubDeployRole.Arn
  CfnExecRoleArn:
    Description: Set as repo variable AWS_CFN_EXEC_ROLE_ARN
    Value: !GetAtt CfnExecRole.Arn
