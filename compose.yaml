# Drop-in MiR robots for an integration test stack:
#   docker compose up -d
#   curl http://localhost:8080/api/v2.0.0/status  (auth: distributor/sha256)
services:
  mir-381:
    build: .
    command: ["--mir-version", "3.8.1"]
    ports:
      - "8080:8080"
  mir-2147:
    build: .
    command: ["--mir-version", "2.14.7"]
    ports:
      - "8081:8080"
