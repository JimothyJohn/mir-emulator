name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync (locked)
        run: uv sync --locked --all-packages

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run ty check packages

      - name: Unit + conformance + fuzz (all tracked MiR versions), coverage-gated
        # pdf_convert's full-document path and both CLI mains are exercised by
        # the live-portal and integration suites; 82 is the offline floor.
        run: >
          uv run pytest -q -m "not integration and not live_portal"
          --cov=packages/mir-emulator/src/mir_emulator
          --cov=packages/mir-spec-scraper/src/mir_spec_scraper
          --cov-report=term --cov-fail-under=82

      - name: Integration tests (real servers over TCP)
        run: uv run pytest -q -m integration

  scenarios:
    # End-to-end smoke of the whole surface: the seven case-study scenarios
    # exercise paths unit tests don't compose (sessions at fleet scale,
    # battery rotation, fault recovery, sustained concurrent load).
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Sync (locked)
        run: uv sync --locked --all-packages

      - name: Run every scenario against fresh emulators
        # Each scenario's acceptance bar is "passes unmodified against a
        # fresh emulator" — so each one gets freshly booted robot + fleet
        # processes (a long-lived pair would leak battery/queue/fault state
        # between scripts), booted exactly as scenarios/README.md says:
        # --mission-duration 2 (WCS stall detectors are tuned to it).
        env:
          MIR_URL: http://127.0.0.1:8080
          MIR_FLEET_URL: http://127.0.0.1:9090
        run: |
          boot() {
            uv run mir-emulator --port 8080 --mission-duration 2 & ROBOT_PID=$!
            uv run mir-emulator --fleet-version 1.5.0 --port 9090 --mission-duration 2 & FLEET_PID=$!
            for i in $(seq 1 30); do
              curl -sf http://127.0.0.1:8080/ >/dev/null 2>&1 &&
              curl -sf http://127.0.0.1:9090/ >/dev/null 2>&1 && return 0
              sleep 1
            done
            echo "emulators failed to boot" >&2; return 1
          }
          status=0
          for scenario in scenarios/*.py; do
            echo "::group::${scenario}"
            boot || exit 1
            if ! uv run "${scenario}"; then
              echo "::error file=${scenario}::scenario failed"
              status=1
            fi
            kill "${ROBOT_PID}" "${FLEET_PID}" 2>/dev/null || true
            wait "${ROBOT_PID}" "${FLEET_PID}" 2>/dev/null || true
            echo "::endgroup::"
          done
          exit "${status}"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: "3.12"
      - name: Build one wheel per tracked MiR version
        run: |
          uv sync --locked --all-packages
          uv run python scripts/build_versioned.py --out dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mir-emulator-wheels
          path: dist/
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    needs: test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build image
        run: docker build -t mir-emulator:ci .
      - name: Smoke test container
        run: |
          docker run -d --name emulator -p 8080:8080 mir-emulator:ci --mir-version 3.8.1
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/ > /dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/ | grep -q '"emulated_mir_version":"3.8.1"'
          curl -fsS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/api/v2.0.0/status | grep -q 401
          docker logs emulator
          docker rm -f emulator

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: low
