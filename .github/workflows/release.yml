name: Release versioned wheels

# Builds one mir-emulator distribution per tracked MiR version, so the
# published package versions match the robot software versions they emulate
# (pip install mir-emulator==3.5.4). Publishes to PyPI only when the
# PYPI_API_TOKEN secret exists; otherwise the wheels land as workflow
# artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Test before building
        run: |
          uv sync --locked --all-packages
          uv run pytest -q -m "not integration and not live_portal"

      - name: Build one wheel per tracked MiR version
        run: uv run python scripts/build_versioned.py --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-wheels
          path: dist/

      - name: Publish to PyPI (if token configured)
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$UV_PUBLISH_TOKEN" ]; then
            echo "::notice::PYPI_API_TOKEN not set; wheels are available as workflow artifacts only."
            exit 0
          fi
          uv publish dist/*
