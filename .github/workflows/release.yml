name: Release versioned wheels

# One mir-emulator distribution per tracked MiR version, so package versions
# match the robot software they emulate (pip install mir-emulator==3.8.1).
# Wheels get build-provenance attestations. Publishing to PyPI happens only
# when PYPI_API_TOKEN is configured (switch to PyPI trusted publishing by
# replacing the publish step with pypa/gh-action-pypi-publish + id-token).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"

      - name: Test before building
        run: |
          uv sync --locked --all-packages
          uv run pytest -q -m "not integration and not live_portal"

      - name: Build one wheel per tracked MiR version
        run: uv run python scripts/build_versioned.py --out dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/*"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-wheels
          path: dist/

      - name: Publish to PyPI (if token configured)
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$UV_PUBLISH_TOKEN" ]; then
            echo "::notice::PYPI_API_TOKEN not set; wheels are available as attested workflow artifacts only."
            exit 0
          fi
          uv publish dist/*
