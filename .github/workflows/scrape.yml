name: Scrape MiR portal for new API versions

# The self-updating loop: check the MiR support portal weekly. New or changed
# API files are converted (PDF -> Swagger 2.0), oracle-validated, and land as
# a PR whose body carries an API changelog. Anything the pipeline could not
# handle (conversion warnings, unusable files) is filed as an issue instead of
# being silently skipped.

on:
  schedule:
    - cron: "17 5 * * 1" # Mondays 05:17 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"

      - name: Check portal credentials
        id: creds
        env:
          MIR_PORTAL_EMAIL: ${{ secrets.MIR_PORTAL_EMAIL }}
        run: |
          if [ -z "$MIR_PORTAL_EMAIL" ]; then
            echo "::notice::MIR_PORTAL_EMAIL/MIR_PORTAL_PASSWORD secrets are not set; skipping scrape. Create a free account at supportportal.mobile-industrial-robots.com and add the secrets to enable self-updating."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync (locked)
        if: steps.creds.outputs.available == 'true'
        run: uv sync --locked --all-packages

      - name: Live portal gate (login, listing parse, PDF->swagger oracle)
        if: steps.creds.outputs.available == 'true'
        env:
          MIR_PORTAL_EMAIL: ${{ secrets.MIR_PORTAL_EMAIL }}
          MIR_PORTAL_PASSWORD: ${{ secrets.MIR_PORTAL_PASSWORD }}
        run: uv run pytest -q -m live_portal

      - name: Scrape and update specs
        if: steps.creds.outputs.available == 'true'
        id: scrape
        env:
          MIR_PORTAL_EMAIL: ${{ secrets.MIR_PORTAL_EMAIL }}
          MIR_PORTAL_PASSWORD: ${{ secrets.MIR_PORTAL_PASSWORD }}
          # Optional: adds an AI "release impact" summary to the PR body.
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
        run: uv run mir-spec-scraper sync --report scrape-report.md

      - name: Test against the updated spec set before proposing it
        if: steps.creds.outputs.available == 'true' && steps.scrape.outputs.changed == 'true'
        run: uv run pytest -q -m "not integration and not live_portal"

      - name: Open PR with new API versions
        if: steps.creds.outputs.available == 'true' && steps.scrape.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: scrape/update-specs
          add-paths: packages/mir-emulator/src/mir_emulator/specs
          commit-message: "feat(specs): ${{ steps.scrape.outputs.summary }}"
          title: "Track new MiR REST API versions"
          body-path: scrape-report.md
          labels: specs, automated

      - name: File an issue when the pipeline needs attention
        if: >
          steps.creds.outputs.available == 'true' &&
          (contains(steps.scrape.outputs.summary, 'kept previous') ||
           contains(steps.scrape.outputs.summary, 'no usable') ||
           contains(steps.scrape.outputs.summary, 'refusing'))
        env:
          GH_TOKEN: ${{ github.token }}
          SUMMARY: ${{ steps.scrape.outputs.summary }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh issue list --repo "$REPO" --label scraper-attention --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "Scrape run needs attention: $SUMMARY"
          else
            gh issue create --repo "$REPO" \
              --title "Spec scraper needs attention" \
              --label scraper-attention \
              --body "The weekly scrape could not fully process the portal listing. Summary: $SUMMARY"
          fi
