name: Deploy demo

# Prod path for the public demo (amr-emulator.com, legacy alias mir.advin.io):
# master-only, OIDC-assumed
# role that can only drive CloudFormation + the artifacts bucket. Resource
# permissions live in the CloudFormation service role (deploy/github-oidc.yaml).

on:
  push:
    branches: [master]
    paths:
      - packages/mir-emulator/**
      - deploy/template.yaml
      - docs/index.html
      - docs/landing.html
      - scripts/deploy_demo.sh
      - .github/workflows/deploy.yml
      - uv.lock
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-demo
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build bundle, deploy stack, smoke test
        env:
          CFN_ROLE_ARN: ${{ vars.AWS_CFN_EXEC_ROLE_ARN }}
          DOMAIN_NAME: amr-emulator.com
          LEGACY_DOMAIN_NAME: mir.advin.io
        run: ./scripts/deploy_demo.sh
