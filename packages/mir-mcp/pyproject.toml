[project]
name = "mir-mcp"
version = "0.1.0"
description = "MCP server exposing MiR robot and fleet control tools (against the emulator or real hardware)"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "mcp>=1.2",
    "httpx>=0.27",
    "mir-client",
]

[tool.uv.sources]
mir-client = { workspace = true }

[project.scripts]
mir-mcp = "mir_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
