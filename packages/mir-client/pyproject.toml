[project]
name = "mir-client"
version = "0.1.0"
description = "Typed Python client for the MiR robot REST API and MiR Fleet Integration API, generated from the official specs"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
dependencies = [
    "httpx>=0.27",
    "attrs>=22.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
