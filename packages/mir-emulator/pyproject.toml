[project]
name = "mir-emulator"
dynamic = ["version"]
description = "Local emulator for the Mobile Industrial Robots (MiR) robot REST API"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
dependencies = [
    "starlette>=0.40",
    "uvicorn>=0.50.0",
    "jsonschema>=4.20",
    "pyyaml>=6.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
ws = ["websockets>=12"]

[project.scripts]
mir-emulator = "mir_emulator.cli:main"

[tool.hatch.version]
path = "src/mir_emulator/_version.py"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
