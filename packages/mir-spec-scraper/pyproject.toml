[project]
name = "mir-spec-scraper"
version = "0.1.0"
description = "Scrapes the MiR support portal for new REST API definition files"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
]

[project.scripts]
mir-spec-scraper = "mir_spec_scraper.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
